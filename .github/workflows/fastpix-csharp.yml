name: Build and Publish to NuGet

on:
  push:
    tags:
      - 'v*.*.*'   # Triggers on version tags like v1.0.0

permissions:
  id-token: write   # required for OIDC trusted publishing
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    environment: Production

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        run: dotnet restore src/Fastpix/Fastpix.csproj

      - name: Build
        run: dotnet build --configuration Release --no-restore src/Fastpix/Fastpix.csproj

      - name: Pack
        run: dotnet pack --configuration Release --no-build --output ./nupkg src/Fastpix/Fastpix.csproj

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: nupkg
          path: ./nupkg

      - name: NuGet login (trusted publishing)
        uses: NuGet/login@v1
        id: login
        with:
          user: FastPix   # nuget.org account that owns the trusted publishing policy

      - name: Push to NuGet
        run: >
          dotnet nuget push ./nupkg/*.nupkg
          --api-key ${{ steps.login.outputs.NUGET_API_KEY }}
          --source https://api.nuget.org/v3/index.json
